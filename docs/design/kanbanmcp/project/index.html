<title>KanbanMCP — Design System</title>
<link rel="stylesheet" href="styles/tokens.css">
<style>
  /* Canvas background gets a touch darker to give the paper artboards definition */
  body { background: #1A1A1A; }

  /* design-canvas chrome restyling so it matches the system */
  .dc-toolbar, .dc-section-title { font-family: var(--font-mono) !important; letter-spacing: 0.14em !important; text-transform: uppercase !important; }

</html>
